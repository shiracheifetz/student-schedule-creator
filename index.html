<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Schedule</title>
    <link rel="icon" type="image" href="calendar.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Student Schedule</h1>
    </header>
    <main>
        <div>
            <h2>Weekly Calender</h2>
        </div>

        
        <div class="form-container">
        <h2>Add a course</h2>
        <form id="addCourseForm">
            <div class="form-group">
                <label for="coursename">Course name: </label>
                <input type="text" id="coursename" name="coursename">
                <small class="error-message" id="coursenameError"></small>
            </div>
            <div class="form-group">
                <label for="teacher">Teacher: </label>
                <input type="text" id="teacher" name="teacher">
                <small class="error-message" id="teacherError"></small>
            </div>
            <div class="form-group">
                <p>Course Day: </p>
                <div class="checkbox-group">
                <label><input type="checkbox" id="sunday" name="sunday" value="sunday">Sunday</label><br>

                <label><input type="checkbox" id="monday" name="monday" value="monday">Monday</label><br>
                
                <label><input type="checkbox" id="tuesday" name="tuesday" value="tuesday">Tuesday</label><br>
                
                <label><input type="checkbox" id="wednesday" name="wednesday" value="wednesday">Wednesday </label><br>
                
                <label><input type="checkbox" id="thursday" name="thursday" value="thursday">Thursday</label><br>

                <label><input type="checkbox" id="friday" name="friday" value="friday">Friday</label><br>
                </div>        
            </div>

            <div class="form-group">
                <p>Course times: </p>
                <label for="startTime">Start time: </label>
                <input type="time" id="startTime" name="startTime">
                <small class="error-message" id="startTimeError"></small>

                <label for="endTime">End time: </label>
                <input type="time" id="endTime" name="endTime">
                <small class="error-message" id="endTimeError"></small>
            </div>

            <div class="form-group">
                <button type="submit">Add Course</button>
            </div>
        </form>
    </div>
    

    </main>
    <script src="script.js"></script>
</body>
</html>
