<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Schedule</title>
    <link rel="icon" type="image" href="calendar.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Student Schedule</h1>
    </header>
    <main>
        <div class="main-area">
            <div class="form-container">
                <h2>Add a course</h2>
                <form id="courseForm">
                    <div class="form-group">
                        <label for="coursename">Course name: </label>
                        <input type="text" id="coursename" name="coursename">
                        <small class="error-message" id="coursenameError"></small>
                    </div>
                    <div class="form-group">
                        <label for="teacher">Teacher: </label>
                        <input type="text" id="teacher" name="teacher">
                        <small class="error-message" id="teacherError"></small>
                    </div>
                    <div class="form-group">
                        <p>Course Day: </p>
                        <div class="checkbox-group" id="day">
                        <label><input type="checkbox"  name="day" value="sunday">Sunday</label><br>

                        <label><input type="checkbox"  name="day" value="monday">Monday</label><br>
                        
                        <label><input type="checkbox"  name="day" value="tuesday">Tuesday</label><br>
                        
                        <label><input type="checkbox"  name="day" value="wednesday">Wednesday </label><br>
                        
                        <label><input type="checkbox"  name="day" value="thursday">Thursday</label><br>

                        <label><input type="checkbox"  name="day" value="friday">Friday</label><br>
                        </div>        
                    </div>

                    <div class="form-group">
                        <p>Course times: </p>
                        <label for="starttime">Start time: </label>
                        <input type="time" id="starttime" name="starttime" required>
                        <small class="error-message" id="startTimeError"></small>

                        <label for="endtime">End time: </label>
                        <input type="time" id="endtime" name="endtime" required>
                        <small class="error-message" id="endTimeError"></small>
                    </div>

                    <div class="form-group">
                        <button type="submit" id="addBtn">Add Course</button>
                    </div>

                    <!--delete course-->
                    <h2>Delete a Course</h2>
                    <div class="form-group">
                        <label for="courses">Choose the course you would like to remove:</label>
                        <select class="courseDropdown"></select>
                    </div>
                    <div class="form-group">
                        <button type="submit" id="deleteBtn" formnovalidate>Delete</button>
                    </div>

                    <!--edit course-->
                    <h2>Edit a Course</h2>
                    <label for="courses">Choose the course you would like to edit:</label>
                    <select class="courseDropdown"></select>
                    <label for="courseDetail">Choose the course detail you would like to edit:</label>
                    <select id="courseDetailDropdown"></select>
                    
                    <div class="form-group">
                        <label for="edit">New Information: </label>
                        <input type="text" id="edit" name="edit">
                        <small class="error-message" id="editError"></small>
                    </div>
                    <div class="form-group">
                        <button type="submit" id="editBtn" formnovalidate>Update</button>
                    </div>
                </form>
            </div>
            

            <div class="calendar-container">
                <div class="month">My Weekly Schedule</div>
                <ul class="weekdays calendar">
                    <li class="weekday">Sun</li>
                    <li class="weekday">Mon</li>
                    <li class="weekday">Tue</li>
                    <li class="weekday">Wed</li>
                    <li class="weekday">Thu</li>
                    <li class="weekday">Fri</li>
                    <li class="weekday">Sat</li>
                </ul>
                <ol class="days calendar">
                    <li class="day"></li>
                    <li class="day"></li>
                    <li class="day"></li>
                    <li class="day"></li>
                    <li class="day"></li>
                    <li class="day"></li>
                    <li class="day"></li>
                </ol>
            </div>
    </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
